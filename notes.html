<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imbuckleyy.xyz | Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/darkly/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-backdrop"></div>
  <nav class="navbar navbar-dark sticky-top app-navbar">
    <div class="container-xxl">
      <a class="navbar-brand brand-wordmark" href="index.html">imbuckleyy.xyz</a>
      <div class="d-flex align-items-center gap-2">
        <span id="liveClock" class="clock-pill">--:--</span>
        <button class="navbar-toggler border-0 menu-trigger" type="button" data-bs-toggle="offcanvas" data-bs-target="#siteMenu" aria-controls="siteMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </div>
  </nav>
  <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="siteMenu" aria-labelledby="siteMenuLabel">
    <div class="offcanvas-header border-bottom border-secondary-subtle">
      <div>
        <div class="section-kicker">Menu</div>
        <h5 class="offcanvas-title mb-0" id="siteMenuLabel">Private hub</h5>
      </div>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div class="list-group list-group-flush">
        <a class="list-group-item list-group-item-action bg-transparent text-light border-secondary-subtle" href="index.html" data-nav-link>Home</a>
        <a class="list-group-item list-group-item-action bg-transparent text-light border-secondary-subtle" href="live.html" data-nav-link>Live</a>
        <a class="list-group-item list-group-item-action bg-transparent text-light border-secondary-subtle" href="schedule.html" data-nav-link>Schedule</a>
        <a class="list-group-item list-group-item-action bg-transparent text-light border-secondary-subtle" href="finance.html" data-nav-link>Money + League</a>
        <a class="list-group-item list-group-item-action bg-transparent text-light border-secondary-subtle" href="tools.html" data-nav-link>FMHY + Chat</a>
        <a class="list-group-item list-group-item-action bg-transparent text-light border-secondary-subtle nav-current" href="notes.html" data-nav-link>Notes</a>
      </div>
    </div>
  </div>

  <main class="container-xxl py-4 py-lg-5">
    <section class="page-shell mb-4">
      <div class="section-kicker">Notes</div>
      <h1 class="page-title page-title-small">Private notes</h1>
      <p class="page-subtitle">A quieter notes view with room to write, save, and organize lists without competing with the rest of the site.</p>
    </section>

    <section class="card section-card">
      <div class="card-body p-4">
        <form id="fileForm" class="row g-2 mb-4">
          <div class="col-12 col-md-9"><input id="fileName" type="text" class="form-control" placeholder="New note title"></div>
          <div class="col-12 col-md-3 d-grid"><button class="btn btn-warning" type="submit">Create note</button></div>
        </form>
        <div class="row g-4">
          <div class="col-12 col-xl-3">
            <aside id="fileList" class="file-list"></aside>
          </div>
          <div class="col-12 col-xl-9">
            <div class="editor-panel">
              <input id="fileTitle" type="text" class="form-control mb-3" placeholder="Note title">
              <textarea id="fileContent" rows="18" class="form-control mb-3" placeholder="Private notes, lists, plans, reminders..."></textarea>
              <div class="d-flex flex-wrap gap-2">
                <button id="saveFile" class="btn btn-warning" type="button">Save note</button>
                <button id="deleteFile" class="btn btn-outline-light" type="button">Delete note</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
